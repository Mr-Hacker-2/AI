<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AXIOM — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #03050a;
    --bg2: #070d16;
    --surface: #0b1220;
    --surface2: #0f1a2e;
    --border: #1a2d4a;
    --border-bright: #1e4080;
    --cyan: #00d4ff;
    --cyan-dim: #0099cc;
    --cyan-glow: rgba(0,212,255,0.15);
    --cyan-glow2: rgba(0,212,255,0.06);
    --teal: #00ffcc;
    --text: #c8ddf0;
    --text-dim: #5a7a9a;
    --text-bright: #e8f4ff;
    --red: #ff3d5a;
    --font-display: 'Orbitron', sans-serif;
    --font-mono: 'Share Tech Mono', monospace;
    --font-body: 'Outfit', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    overflow: hidden;
  }

  /* ── BACKGROUND ── */
  #canvas-bg {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }

  .scanlines {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
  }

  .vignette {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%);
  }

  /* ── LAYOUT ── */
  #app {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    height: 100vh; max-width: 900px;
    margin: 0 auto; padding: 0 16px;
  }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 0 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    display: flex; align-items: center; gap: 12px;
  }

  .logo-icon {
    width: 38px; height: 38px;
    border: 1.5px solid var(--cyan);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    box-shadow: 0 0 12px var(--cyan-glow), inset 0 0 12px var(--cyan-glow2);
    animation: pulse-border 3s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%,100% { box-shadow: 0 0 10px var(--cyan-glow), inset 0 0 10px var(--cyan-glow2); }
    50% { box-shadow: 0 0 22px rgba(0,212,255,0.35), inset 0 0 20px rgba(0,212,255,0.12); }
  }

  .logo-icon svg { width: 20px; height: 20px; fill: var(--cyan); }

  .logo-text {
    font-family: var(--font-display);
    font-size: 1.25rem; font-weight: 900;
    letter-spacing: 0.2em; color: var(--text-bright);
    text-shadow: 0 0 20px rgba(0,212,255,0.4);
  }

  .logo-sub {
    font-family: var(--font-mono);
    font-size: 0.6rem; color: var(--cyan-dim);
    letter-spacing: 0.15em; margin-top: 2px;
  }

  .status-bar {
    display: flex; align-items: center; gap: 20px;
  }

  .status-pill {
    display: flex; align-items: center; gap: 7px;
    font-family: var(--font-mono); font-size: 0.68rem;
    color: var(--text-dim); letter-spacing: 0.05em;
  }

  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 8px rgba(0,255,204,0.7);
    animation: blink 2.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%,100% { opacity: 1; } 50% { opacity: 0.3; }
  }

  .model-tag {
    font-family: var(--font-mono); font-size: 0.65rem;
    color: var(--cyan-dim); background: rgba(0,212,255,0.07);
    border: 1px solid var(--border-bright);
    padding: 3px 9px; border-radius: 3px;
    letter-spacing: 0.08em;
  }

  /* ── CHAT WINDOW ── */
  #chat-window {
    flex: 1; overflow-y: auto; padding: 24px 0 8px;
    display: flex; flex-direction: column; gap: 20px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }

  #chat-window::-webkit-scrollbar { width: 4px; }
  #chat-window::-webkit-scrollbar-track { background: transparent; }
  #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── MESSAGES ── */
  .msg {
    display: flex; gap: 14px;
    animation: msg-in 0.3s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 34px; height: 34px; border-radius: 8px;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 0.6rem; font-weight: 700;
    letter-spacing: 0.05em;
  }

  .msg.ai .avatar {
    background: linear-gradient(135deg, #071e38 0%, #0d2d50 100%);
    border: 1px solid var(--border-bright);
    color: var(--cyan);
    box-shadow: 0 0 12px rgba(0,212,255,0.15);
  }

  .msg.user .avatar {
    background: linear-gradient(135deg, #1a0d2e 0%, #2a0e4a 100%);
    border: 1px solid #3a1a6a;
    color: #cc88ff;
    box-shadow: 0 0 12px rgba(180,100,255,0.15);
  }

  .bubble {
    max-width: 75%; padding: 12px 16px; border-radius: 12px;
    font-size: 0.92rem; line-height: 1.65; font-weight: 300;
    position: relative;
  }

  .msg.ai .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 2px solid var(--cyan-dim);
    color: var(--text);
    box-shadow: 0 2px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.03);
  }

  .msg.user .bubble {
    background: linear-gradient(135deg, #10062a 0%, #180935 100%);
    border: 1px solid #2d1255;
    border-right: 2px solid #9955dd;
    color: var(--text-bright);
    box-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }

  .msg-meta {
    font-family: var(--font-mono); font-size: 0.58rem;
    color: var(--text-dim); margin-top: 4px; letter-spacing: 0.05em;
  }

  .msg.user .msg-meta { text-align: right; }

  /* ── TYPING INDICATOR ── */
  #typing-indicator {
    display: none; align-items: center; gap: 14px;
    animation: msg-in 0.3s ease both;
  }

  #typing-indicator.show { display: flex; }

  .typing-bubble {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 2px solid var(--cyan-dim);
    padding: 12px 18px; border-radius: 12px;
    display: flex; align-items: center; gap: 5px;
  }

  .typing-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--cyan-dim);
    animation: typing 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%,60%,100% { opacity: 0.2; transform: scale(0.8); }
    30% { opacity: 1; transform: scale(1); }
  }

  /* ── WELCOME SCREEN ── */
  #welcome {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; text-align: center; gap: 16px;
    padding-bottom: 60px;
  }

  #welcome h2 {
    font-family: var(--font-display); font-size: 1.05rem;
    font-weight: 600; letter-spacing: 0.2em; color: var(--text-dim);
  }

  #welcome p {
    font-size: 0.88rem; color: var(--text-dim);
    max-width: 380px; line-height: 1.7; font-weight: 300;
  }

  .welcome-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-top: 8px; width: 100%; max-width: 480px;
  }

  .prompt-chip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 11px 14px;
    font-size: 0.8rem; color: var(--text-dim); cursor: pointer;
    text-align: left; transition: all 0.2s;
    font-family: var(--font-body); font-weight: 400;
    line-height: 1.4;
  }

  .prompt-chip:hover {
    border-color: var(--cyan-dim); color: var(--text);
    background: var(--surface2);
    box-shadow: 0 0 12px var(--cyan-glow2);
  }

  /* ── INPUT AREA ── */
  #input-area {
    padding: 14px 0 20px; flex-shrink: 0;
    border-top: 1px solid var(--border);
  }

  .input-wrapper {
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 10px 10px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: var(--cyan-dim);
    box-shadow: 0 0 20px var(--cyan-glow2), 0 0 0 1px rgba(0,212,255,0.08);
  }

  #user-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text-bright); font-family: var(--font-body);
    font-size: 0.92rem; font-weight: 300; resize: none;
    max-height: 120px; line-height: 1.55;
    scrollbar-width: thin;
  }

  #user-input::placeholder { color: var(--text-dim); }

  #send-btn {
    width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
    background: linear-gradient(135deg, #004466 0%, #005577 100%);
    border: 1px solid var(--cyan-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; color: var(--cyan);
  }

  #send-btn:hover {
    background: linear-gradient(135deg, #005577 0%, #0077aa 100%);
    box-shadow: 0 0 14px var(--cyan-glow);
    transform: scale(1.05);
  }

  #send-btn:active { transform: scale(0.97); }

  #send-btn svg { width: 15px; height: 15px; }

  .input-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 2px 0;
  }

  .input-hint {
    font-family: var(--font-mono); font-size: 0.6rem;
    color: var(--text-dim); letter-spacing: 0.05em;
  }

  #char-count {
    font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-dim);
  }

  /* ── CORNER DECORATIONS ── */
  .corner {
    position: fixed; width: 40px; height: 40px;
    z-index: 5; pointer-events: none; opacity: 0.5;
  }
  .corner-tl { top: 12px; left: 12px; border-top: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
  .corner-tr { top: 12px; right: 12px; border-top: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }
  .corner-bl { bottom: 12px; left: 12px; border-bottom: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
  .corner-br { bottom: 12px; right: 12px; border-bottom: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }

  /* scrolled to bottom indicator */
  .scroll-indicator {
    display: none; position: absolute; right: 20px; bottom: 90px;
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border-bright);
    align-items: center; justify-content: center; cursor: pointer;
    color: var(--cyan); z-index: 20; transition: all 0.2s;
  }
</style>
</head>
<body>

<canvas id="canvas-bg"></canvas>
<div class="scanlines"></div>
<div class="vignette"></div>

<!-- Corner decorations -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div id="app">
  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">AXIOM</div>
        <div class="logo-sub">NEURAL INTERFACE v2.4.1</div>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-pill">
        <div class="dot"></div>
        ONLINE
      </div>
      <div class="model-tag">CLAUDE SONNET</div>
    </div>
  </header>

  <!-- Chat window -->
  <div id="chat-window">
    <div id="welcome">
      <h2>INITIALIZE SESSION</h2>
      <p>AXIOM is powered by Claude AI. Ask anything — code, analysis, creative writing, or just a conversation.</p>
      <div class="welcome-grid">
        <button class="prompt-chip" onclick="quickSend(this)">Explain quantum computing in simple terms</button>
        <button class="prompt-chip" onclick="quickSend(this)">Write a Python script to sort a list of objects</button>
        <button class="prompt-chip" onclick="quickSend(this)">What are the best productivity habits?</button>
        <button class="prompt-chip" onclick="quickSend(this)">Create a short sci-fi story opening</button>
      </div>
    </div>

    <div id="typing-indicator">
      <div class="avatar" style="width:34px;height:34px;background:linear-gradient(135deg,#071e38,#0d2d50);border:1px solid #1e4080;display:flex;align-items:center;justify-content:center;border-radius:8px;font-family:var(--font-display);font-size:.6rem;font-weight:700;color:var(--cyan);box-shadow:0 0 12px rgba(0,212,255,.15)">AI</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <div id="input-area">
    <div class="input-wrapper">
      <textarea id="user-input" rows="1" placeholder="Send a message to AXIOM..." maxlength="4000"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span class="input-hint">ENTER to send &nbsp;·&nbsp; SHIFT+ENTER for new line</span>
      <span id="char-count">0 / 4000</span>
    </div>
  </div>
</div>

<script>
// ── PARTICLE BACKGROUND ──
const canvas = document.getElementById('canvas-bg');
const ctx = canvas.getContext('2d');
let W, H, particles = [], gridOpacity = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Grid + glow
function drawGrid() {
  const step = 60;
  ctx.strokeStyle = `rgba(0,100,160,0.12)`;
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

// Floating particles
for (let i = 0; i < 55; i++) {
  particles.push({
    x: Math.random() * 2000,
    y: Math.random() * 1200,
    r: Math.random() * 1.5 + 0.3,
    dx: (Math.random() - 0.5) * 0.3,
    dy: (Math.random() - 0.5) * 0.3,
    alpha: Math.random() * 0.5 + 0.1,
    color: Math.random() > 0.6 ? '0,212,255' : '0,255,180'
  });
}

function animBg() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#03050a';
  ctx.fillRect(0, 0, W, H);
  drawGrid();

  // Ambient glow
  const grd = ctx.createRadialGradient(W*0.5, H*0.6, 0, W*0.5, H*0.6, H*0.75);
  grd.addColorStop(0, 'rgba(0,60,120,0.12)');
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  particles.forEach(p => {
    p.x += p.dx; p.y += p.dy;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.color},${p.alpha})`;
    ctx.fill();
  });

  requestAnimationFrame(animBg);
}
animBg();

// ── CHAT STATE ──
const chatWindow = document.getElementById('chat-window');
const welcome = document.getElementById('welcome');
const typingEl = document.getElementById('typing-indicator');
const inputEl = document.getElementById('user-input');
const charCountEl = document.getElementById('char-count');
let history = [];
let isLoading = false;

// ── AUTO-RESIZE TEXTAREA ──
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  charCountEl.textContent = inputEl.value.length + ' / 4000';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ── SCROLL ──
function scrollToBottom() {
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

// ── ADD MESSAGE ──
function addMessage(role, text) {
  const now = new Date();
  const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatarLabel = role === 'ai' ? 'AI' : 'YOU';
  div.innerHTML = `
    <div class="avatar">${avatarLabel}</div>
    <div>
      <div class="bubble">${escapeHtml(text)}</div>
      <div class="msg-meta">${time}</div>
    </div>
  `;

  // Insert before typing indicator
  chatWindow.insertBefore(div, typingEl);
  scrollToBottom();
  return div;
}

function escapeHtml(t) {
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

// ── QUICK PROMPTS ──
function quickSend(btn) {
  const text = btn.textContent.trim();
  inputEl.value = text;
  sendMessage();
}

// ── SEND ──
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  // Hide welcome screen
  if (welcome) welcome.style.display = 'none';

  // Clear input
  inputEl.value = '';
  inputEl.style.height = 'auto';
  charCountEl.textContent = '0 / 4000';

  // Add user message
  addMessage('user', text);
  history.push({ role: 'user', content: text });

  // Show typing
  isLoading = true;
  typingEl.classList.add('show');
  scrollToBottom();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'You are AXIOM, a sleek, highly capable AI assistant with a slightly futuristic but friendly personality. Be concise, precise, and helpful. Avoid excessive markdown unless the user asks for it.',
        messages: history
      })
    });

    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Signal lost. Please try again.';

    typingEl.classList.remove('show');
    addMessage('ai', reply);
    history.push({ role: 'assistant', content: reply });

  } catch (err) {
    typingEl.classList.remove('show');
    addMessage('ai', 'Connection error. Check your network and retry.');
  }

  isLoading = false;
  inputEl.focus();
}
</script>
</body>
</html>
